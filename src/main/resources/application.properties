# Application Name
spring.application.name=aca-info

# Active Profile (default: dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JWT Configuration
# Access token: 2h (short-lived, refreshed silently by the frontend interceptor)
# Refresh token: 30 days (long-lived, allows users to stay logged in across sessions)
jwt.secret=your-256-bit-secret-key-change-this-in-production-minimum-32-characters-required
jwt.access-token-expiration=2592000000
jwt.refresh-token-expiration=2592000000
jwt.token-prefix=Bearer\u0020
jwt.header-name=Authorization

# Cookie del refresh token (httpOnly). En dev (http localhost) secure=false.
app.auth.refresh-cookie.secure=false
app.auth.refresh-cookie.same-site=Lax

# Flyway: apagado por defecto (dev/test usan H2 con create-drop).
# Los perfiles Postgres (local, prod) lo activan.
spring.flyway.enabled=false

# SpringDoc / Swagger UI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# File Storage Configuration
app.storage.local.base-path=${FILE_UPLOAD_DIR:./storage/materials}

# Monthly session generation: day 1 of each month at 02:00.
# Generates the regular sessions of the current month for every active group, capped by group.endDate.
app.session.monthly-generation.cron=-

# Material auto-disable scheduled task
# Materials that have been visible AND downloadable for >= threshold-days are
# automatically hidden and have download disabled. Admin must reactivate them.
app.material.auto-disable.threshold-days=1000
app.material.auto-disable.cron=-

# Pending enrollment expiration (48h): APAGADO a propósito (16-jul-2026).
# Con un solo admin que no entra a diario, caducaba solicitudes en silencio: ni el
# alumno sabía del plazo ni el admin tenía aviso. Ahora la solicitud espera al admin.
app.enrollment.expiration.cron=-

# Expired token cleanup (refresh + email verification + password reset): daily at 05:00.
app.cleanup.expired-tokens.cron=0 0 5 * * *

# Multipart File Upload Configuration (20MB: lotes de capturas del generador; nginx ya está en 20M)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.enabled=true

# Al declarar el bean "aiJobExecutor", Boot retiraría el applicationTaskExecutor
# autoconfigurado y los @Async sin cualificar (emails, auto-reservas) se colarían
# detrás de jobs de minutos. "force" conserva el executor por defecto para el resto.
spring.task.execution.mode=force

# Generador/transcriptor LaTeX (Claude + tectonic). La API key JAMAS se commitea:
# env var local en dev, /opt/acainfo/.env en prod.
app.anthropic.api-key=${ANTHROPIC_API_KEY:}
app.anthropic.model=claude-opus-4-8
app.anthropic.max-tokens=16000
app.anthropic.max-fix-retries=2
app.anthropic.tectonic.binary-path=${TECTONIC_BINARY_PATH:tectonic}
app.anthropic.tectonic.timeout-seconds=120

# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email Verification Settings
app.email.from=${GMAIL_USERNAME:noreply@acainfo.com}
app.email.verification.expiration-hours=24
app.email.verification.base-url=${APP_BASE_URL:http://localhost:5173}/verify-email
app.email.mock=false

# Password Reset Settings
app.email.password-reset.expiration-hours=1
app.email.password-reset.base-url=${APP_BASE_URL:http://localhost:5173}/reset-password
