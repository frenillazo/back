# Development Profile - H2 In-Memory Database

# H2 Database Configuration
# NON_KEYWORDS=YEAR: subjects.year es palabra reservada en H2 2.x
spring.datasource.url=jdbc:h2:mem:formaciondb;NON_KEYWORDS=YEAR
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration (dialecto autodetectado; explicitarlo está deprecado desde Hibernate 6.6)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-dev.sql

# Logging
logging.level.com.acainfo=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Mock email in development (log instead of sending)
app.email.mock=true
