# Production Profile - PostgreSQL Database

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/formaciondb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JPA/Hibernate Configuration (dialecto autodetectado; explicitarlo está deprecado desde Hibernate 6.6)
spring.jpa.hibernate.ddl-auto=validate

# Flyway: el esquema lo gestionan las migraciones de db/migration.
# baseline-on-migrate marca la BD existente como V1 sin tocarla y aplica V2+.
# OJO: el compose de prod debe dejar de definir SPRING_JPA_HIBERNATE_DDL_AUTO=update.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.com.acainfo=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# JWT Configuration (use environment variables in production)
# Property names must match JwtProperties (accessTokenExpiration / refreshTokenExpiration).
# Defaults: access 2h, refresh 30 days.
jwt.secret=${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:7200000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:2592000000}

# Cookie del refresh token (httpOnly). En prod (https tras Cloudflare) secure=true.
app.auth.refresh-cookie.secure=${AUTH_REFRESH_COOKIE_SECURE:true}
app.auth.refresh-cookie.same-site=Lax

# Security - Swagger UI disabled in production
app.swagger.enabled=false

# File Storage Configuration (absolute path for production)
app.storage.local.base-path=${FILE_UPLOAD_DIR:/app/materials}

# Tectonic: binario montado como volumen, NO está en el PATH del contenedor.
app.anthropic.tectonic.binary-path=${TECTONIC_BINARY_PATH:/app/bin/tectonic}
